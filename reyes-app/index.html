<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="La Casa De Las Dinamicas" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="La Casa" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#C9A227" />
    <meta name="description" content="La mejor plataforma de dinamicas y sorteos de Colombia." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.lacasadelasdinamicas.com/" />
    <meta property="og:title" content="La Casa De Las Dinamicas" />
    <meta property="og:description" content="La mejor plataforma de dinamicas del pais. Participa y gana!" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <title>La Casa De Las Dinamicas</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #080808; }
      body { font-family: 'DM Sans', system-ui, sans-serif; }
      #root { min-height: 100%; }
      #splash { position: fixed; inset: 0; background: #080808; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 9999; transition: opacity .4s; }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-title { color: #C9A227; font-weight: 700; letter-spacing: 2px; font-size: 13px; text-transform: uppercase; }
      @supports (padding: env(safe-area-inset-bottom)) { body { padding-bottom: env(safe-area-inset-bottom); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,4 92,20 92,60 50,96 8,60 8,20" fill="#1a1000" stroke="#C9A227" stroke-width="3"/>
        <polygon points="50,22 72,36 28,36" fill="#C9A227"/>
        <rect x="30" y="36" width="40" height="26" fill="#2a1e00"/>
        <rect x="45" y="50" width="10" height="12" rx="2" fill="#1a1000"/>
        <rect x="33" y="40" width="5" height="5" rx="1" fill="#E8C547"/>
        <rect x="62" y="40" width="5" height="5" rx="1" fill="#E8C547"/>
        <rect x="20" y="67" width="60" height="22" rx="3" fill="#0d0900" stroke="#C9A227" stroke-width="1.5"/>
        <text x="50" y="74" text-anchor="middle" fill="#C9A227" font-size="5.5" font-weight="bold">LA CASA</text>
        <text x="50" y="80" text-anchor="middle" fill="#C9A227" font-size="3.5">DE LAS</text>
        <text x="50" y="86" text-anchor="middle" fill="#C9A227" font-size="5" font-weight="bold">DINAMICAS</text>
      </svg>
      <div id="splash-title">Cargando La Casa...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => { const s = document.getElementById('splash'); if(s) s.classList.add('hidden') }, 800)
      })
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              navigator.serviceWorker.addEventListener('message', e => {
                if (e.data?.type === 'NAVIGATE') window.location.href = e.data.url
              })
            })
            .catch(err => console.log('SW error:', err))
        })
      }
      window.deferredInstallPrompt = null
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault()
        window.deferredInstallPrompt = e
        window.dispatchEvent(new CustomEvent('pwaInstallAvailable'))
      })
      window.addEventListener('appinstalled', () => {
        window.deferredInstallPrompt = null
        localStorage.setItem('pwaInstalled', 'true')
        window.dispatchEvent(new CustomEvent('pwaInstalled'))
      })
    </script>
  </body>
</html>
