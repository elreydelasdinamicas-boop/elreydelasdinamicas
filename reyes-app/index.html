<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="La Casa De Las Dinamicas" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="La Casa" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#E6BE00" />
    <meta name="description" content="La mejor plataforma de dinamicas y sorteos de Colombia." />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <title>La Casa De Las Dinamicas</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #000; }
      body { font-family: 'DM Sans', system-ui, sans-serif; }
      #root { min-height: 100%; }
      @supports (padding: env(safe-area-inset-bottom)) {
        body { padding-bottom: env(safe-area-inset-bottom); }
      }
      #loader {
        position: fixed; inset: 0; background: #000;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.4s ease;
      }
      #loader.hide { opacity: 0; pointer-events: none; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid #1a1a1a;
        border-top-color: #E6BE00;
        animation: spin 0.8s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      function hideLoader() {
        var l = document.getElementById('loader')
        if (!l) return
        l.classList.add('hide')
        setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l) }, 450)
      }
      window.addEventListener('load', function() { setTimeout(hideLoader, 400) })
      setTimeout(hideLoader, 3000)

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(e) { console.log('SW:', e) })
        })
      }
      window.deferredInstallPrompt = null
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault()
        window.deferredInstallPrompt = e
        window.dispatchEvent(new CustomEvent('pwaInstallAvailable'))
      })
      window.addEventListener('appinstalled', function() {
        window.deferredInstallPrompt = null
        localStorage.setItem('pwaInstalled', 'true')
        window.dispatchEvent(new CustomEvent('pwaInstalled'))
      })
    </script>
  </body>
</html>
